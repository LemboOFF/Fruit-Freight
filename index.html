<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fruit Freight</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="gameCanvas"></canvas>
  <script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");

    // Map dimensions
    const MAP_WIDTH = 1000;
    const MAP_HEIGHT = 1500;
    const GROUND_Y = 584;

    // Camera view size (what you see)
    const VIEW_W = 250;
    const VIEW_H = 250;

    // Scale canvas to fit screen nicely
    const scale = Math.min(window.innerWidth / VIEW_W, window.innerHeight / VIEW_H);
    canvas.width = VIEW_W * scale;
    canvas.height = VIEW_H * scale;
    ctx.scale(scale, scale);

    // Load map
    const mapImg = new Image();
    mapImg.src = "mapsprite.png";

    // Player
    const player = {
      x: 500,
      y: 800,
      width: 32,
      height: 32,
      speed: 4,
      img: new Image()
    };
    player.img.src = "blueberry.png";

    // Input
    const keys = {};
    document.addEventListener("keydown", e => keys[e.key] = true);
    document.addEventListener("keyup", e => keys[e.key] = false);

    function update() {
      if (keys["w"] || keys["W"]) player.y -= player.speed;
      if (keys["s"] || keys["S"]) player.y += player.speed;
      if (keys["a"] || keys["A"]) player.x -= player.speed;
      if (keys["d"] || keys["D"]) player.x += player.speed;

      // Keep player on the ground area
      if (player.y < GROUND_Y) player.y = GROUND_Y;
      if (player.y + player.height > MAP_HEIGHT) player.y = MAP_HEIGHT - player.height;
      if (player.x < 0) player.x = 0;
      if (player.x + player.width > MAP_WIDTH) player.x = MAP_WIDTH - player.width;
    }

    function getCamera() {
      // Center camera on player
      let camX = player.x + player.width / 2 - VIEW_W / 2;
      let camY = player.y + player.height / 2 - VIEW_H / 2;

      // Clamp camera so it doesn't go outside the map
      camX = Math.max(0, Math.min(camX, MAP_WIDTH - VIEW_W));
      camY = Math.max(0, Math.min(camY, MAP_HEIGHT - VIEW_H));

      return { x: camX, y: camY };
    }

    function draw() {
      const cam = getCamera();

      ctx.clearRect(0, 0, VIEW_W, VIEW_H);

      // Draw only the visible portion of the map
      if (mapImg.complete) {
        ctx.drawImage(
          mapImg,
          cam.x, cam.y, VIEW_W, VIEW_H, // source: slice of the map
          0, 0, VIEW_W, VIEW_H           // destination: full canvas
        );
      }

      // Draw player relative to camera
      if (player.img.complete) {
        ctx.drawImage(
          player.img,
          player.x - cam.x,
          player.y - cam.y,
          player.width,
          player.height
        );
      }
    }

    function gameLoop() {
      update();
      draw();
      requestAnimationFrame(gameLoop);
    }

    mapImg.onload = () => gameLoop();
  </script>
</body>
</html>
